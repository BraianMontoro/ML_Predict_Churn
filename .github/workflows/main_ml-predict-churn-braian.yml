name: Build and deploy Python app to Azure Web App - ml-predict-churn-braian

concurrency:
  group: azure-appservice-ml-predict-churn-braian
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install test dependencies
        run: |
          pip install pytest httpx

      - name: Run tests
        run: |
          python -m pytest -q

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "ml-predict-churn-braian"
          slot-name: "production"
          publish-profile: ${{ secrets.AzureAppService_PublishProfile_4ee3ded2642b465fbd392446d375f0d2 }}
          package: .
